<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Construtor de Formulário</title>
</head>
<body>

<form>
    <h1>Crie seu formulário</h1>

    <button type="button" onclick="novoCampo()">Novo campo</button>
    <button type="button" onclick="visualizarForm()">Concluir</button>
    <hr>

    <label for="rotulo0">Rótulo</label>
    <input type="text" name="rotulo0">

    <label for="tipo0">Tipo</label>
    <select name="tipo0" onchange="mostrarOpcoes(this,0)">
        <option value="text">Texto</option>
        <option value="number">Número</option>
        <option value="date">Data</option>
        <option value="select">Opções</option>
        <option value="textarea">Texto longo</option>
    </select>

    <input type="text" name="opcoes0" placeholder="Separe por vírgula" style="display:none; width:200px;">

    <br>
</form>

<script src="script.js"></script>

<iframe id="preview" style="width:100%; height:300px; border:1px solid black;"></iframe>

</body>
</html>
